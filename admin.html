<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>SkillBloom – Админ-панель</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <header class="glass-panel">
      <h1>Админ-панель</h1>
    </header>

    <main id="main-content">
      <section class="tab-content active">
        <div class="admin-panel glass-panel">
          <div class="admin-actions">
            <button id="btn-refresh" class="btn btn-accent">🔄 Обновить список</button>
            <button id="btn-load-self" class="btn btn-accent">📥 Загрузить себя</button>
            <span id="user-count" style="color:var(--text-secondary); margin-left:auto;"></span>
          </div>
          <div id="users-list" class="users-list">
            <p class="muted">Загрузка...</p>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- Модалка деталей пользователя -->
  <div id="modal-user-detail" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content glass-panel" style="max-width: 450px; max-height: 80vh; overflow-y: auto;">
      <div id="user-detail-content"></div>
      <div class="modal-actions">
        <button class="btn modal-close">Закрыть</button>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

  <script>

      apiKey: "AIzaSyD10aDO_OiGUcIbB23bp1f5l2hxarSJM3M",
      authDomain: "skillbloom-sync.firebaseapp.com",
      databaseURL: "https://skillbloom-sync-default-rtdb.firebaseio.com",
      projectId: "skillbloom-sync",
      storageBucket: "skillbloom-sync.firebasestorage.app",
      messagingSenderId: "384102512050",
      appId: "1:384102512050:web:b28d823a30630df79120ab"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
  </script>

  <script src="JS/admin.js"></script>
</body>
</html>
